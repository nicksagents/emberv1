[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "{{package_name}}"
version = "0.1.0"
description = "{{app_title}}"
requires-python = ">=3.11"
dependencies = [
  "fastapi",
  "uvicorn[standard]"
]

[project.optional-dependencies]
dev = ["pytest"]
